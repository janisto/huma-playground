# Auto-label PRs based on changed file paths
# Docs: https://github.com/actions/labeler

# Application code
app:
  - changed-files:
      - any-glob-to-any-file:
          - 'cmd/**'
          - 'internal/**'

tests:
  - changed-files:
      - any-glob-to-any-file: '**/*_test.go'

functions:
  - changed-files:
      - any-glob-to-any-file: 'functions/**'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'README.md'
          - 'AGENTS.md'
          - '.agents/**/*.md'
          - '.github/**/*.md'

tooling:
  - changed-files:
      - any-glob-to-any-file:
          - 'Justfile'
          - 'Dockerfile'
          - '.dockerignore'
          - 'firebase.json'
          - '.golangci.yml'
          - 'go.mod'
          - 'go.sum'
          - 'go.work'
          - 'go.work.sum'
          - 'functions/go.mod'
          - 'functions/go.sum'

github-actions:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/dependabot.yml'

feature:
  - head-branch: ['^feature', 'feature']

bug:
  - head-branch: ['^bug', 'bug']

improvement:
  - head-branch: ['^improve', 'improve', 'improvement']
