name: Pull Request Labeler

on:
  pull_request_target:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Run labeler
        uses: actions/labeler@v6.2.0
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true
