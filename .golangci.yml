version: "2"

linters:
  default: standard
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - copyloopvar
    - durationcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - fatcontext
    - gocheckcompilerdirectives
    - gochecksumtype
    - gosec
    - govet
    - ineffassign
    - intrange
    - loggercheck
    - makezero
    - misspell
    - modernize
    - musttag
    - nilerr
    - nilnesserr
    - noctx
    - nolintlint
    - perfsprint
    - predeclared
    - reassign
    - recvcheck
    - staticcheck
    - thelper
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign

  settings:
    errcheck:
      check-type-assertions: true

    gosec:
      excludes:
        - G104

    govet:
      enable:
        - shadow

    misspell:
      locale: US

    nolintlint:
      require-explanation: true
      require-specific: true

    recvcheck:
      exclusions:
        - "Time.MarshalCBOR"

    staticcheck:
      checks:
        - all
        - -ST1000

  exclusions:
    generated: strict

formatters:
  enable:
    - gci
    - gofumpt
    - golines

  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/janisto/huma-playground)
      custom-order: true

    gofumpt:
      module-path: github.com/janisto/huma-playground
      extra-rules: true

    golines:
      max-len: 120
      tab-len: 4

  exclusions:
    generated: strict

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true

  show-stats: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
